{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Favicon & Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="76x76" href="{% static 'assets/img/apple-icon.png' %}">
  <link rel="icon" type="image/png" href="{% static 'assets/img/favicon.png' %}">

  <title>Log In</title>

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700"
    rel="stylesheet"
  />

  <!-- Nucleo Icons -->
  <link
    href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-icons.css"
    rel="stylesheet"
  />
  <link
    href="https://demos.creative-tim.com/argon-dashboard-pro/assets/css/nucleo-svg.css"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>

  <!-- Argon Dashboard CSS -->
  <link
    id="pagestyle"
    href="{% static 'assets/css/argon-dashboard.css' %}?v=2.1.0"
    rel="stylesheet"
  />

  <!-- page-specific style for login background -->
  <style>
    body.login-bg {
      background: url("{% static 'assets/img/login-bg.jpg.webp' %}") no-repeat center center fixed;
      background-size: cover;
    }
  </style>
</head>

<body class="login-bg d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
    <h2 class="text-center mb-4">Sign In</h2>
    <p class="text-center text-secondary mb-4">
      Enter your email and password to sign in
    </p>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-3">
        <input
          type="text"
          name="username"
          class="form-control"
          placeholder="Email"
          required
          autofocus
        >
      </div>
      <div class="mb-3">
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Password"
          required
        >
      </div>
      <div class="form-check form-switch mb-3">
        <input
          class="form-check-input"
          type="checkbox"
          name="remember"
          id="id_remember"
        >
        <label class="form-check-label" for="id_remember">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
    <p class="text-center mt-3 small">
      Don’t have an account?
      <a href="{% url 'register' %}">Sign up</a>
    </p>
  </div>

  <!-- Core JS Files -->
  <script src="{% static 'assets/js/core/popper.min.js' %}"></script>
  <script src="{% static 'assets/js/core/bootstrap.min.js' %}"></script>
  <script src="{% static 'assets/js/plugins/perfect-scrollbar.min.js' %}"></script>
  <script src="{% static 'assets/js/plugins/smooth-scrollbar.min.js' %}"></script>
  <script src="{% static 'assets/js/plugins/chartjs.min.js' %}"></script>
  <script async defer src="https://buttons.github.io/buttons.js"></script>
  <script src="{% static 'assets/js/argon-dashboard.min.js' %}?v=2.1.0"></script>
</body>
</html>
